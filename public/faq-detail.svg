  <text x="80" y="90" font-family="Arial" font-size="28" text-anchor="middle" fill="#ffffff" font-weight="bold">?</text>

  <text x="124" y="78" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="30" font-weight="900" fill="#ffffff" letter-spacing="2">常见问题解答</text>
  <text x="126" y="105" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="13" fill="rgba(255,255,255,0.7)" letter-spacing="3">FAQ · 让您买得放心用得安心</text>

  <!-- 产品名称标签 -->
  <rect x="80" y="130" width="300" height="30" rx="15" fill="rgba(255,255,255,0.15)"/>
  <text x="100" y="150" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="13" fill="#ffffff" font-weight="700">魔根金虫草胶囊</text>

  <!-- ===== 波浪分割 ===== -->
  <path d="M0,190 Q90,180 180,190 T360,190 T540,190 T720,190 T900,190 T1080,190" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <path d="M0,198 Q120,188 240,198 T480,198 T720,198 T960,198 T1080,198" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>

  <!-- ===== 内容区域（带边距，内容全部完整显示） ===== -->
  
  <!-- FAQ 1：正品 -->
  <g transform="translate(50, 220)">
    <rect width="980" height="105" rx="14" fill="url(#cardBg)" filter="url(#shadow)"/>
    <rect x="0" y="0" width="980" height="105" rx="14" fill="none" stroke="rgba(26,115,232,0.08)" stroke-width="1"/>
    <!-- 左侧蓝色色块 -->
