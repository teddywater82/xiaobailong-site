  <text x="70" y="968" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="13" fill="rgba(255,255,255,0.3)">魔根金虫草胶囊 · <tspan fill="rgba(212,175,55,0.4)">药食同源 道地产品</tspan></text>
  <text x="1750" y="968" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="14" fill="rgba(245,217,122,0.4)" text-anchor="end">更多问题请咨询客服 💬</text>

  <!-- 底部装饰横条 -->
  <rect x="20" y="1030" width="1880" height="30" rx="0 0 24 24" fill="rgba(212,175,55,0.04)"/>
