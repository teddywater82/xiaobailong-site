    <text x="22" y="30.5" font-family="Arial" font-size="11" text-anchor="middle" fill="#0d1b0e" font-weight="bold">?</text>
    <text x="42" y="30.5" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="15" font-weight="600" fill="#f5d97a">每天吃几粒？什么时候吃效果最好？</text>

