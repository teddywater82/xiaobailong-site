    <text x="22" y="76.5" font-family="Arial" font-size="11" text-anchor="middle" fill="#66bb6a" font-weight="bold">✓</text>
    <text x="42" y="69" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="14" fill="rgba(255,255,255,0.85)">
