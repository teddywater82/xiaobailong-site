    </text>
    <text x="50" y="121" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="14" fill="#444444">
      👩 <tspan fill="#1a73e8" font-weight="600">女士</tspan>：每天吃2粒，<tspan fill="#e53935" font-weight="600">间隔一天吃</tspan>。
    </text>
