<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff8f0"/>
      <stop offset="100%" style="stop-color:#fef5e8"/>
    </linearGradient>
    <linearGradient id="headerBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c0392b"/>
      <stop offset="100%" style="stop-color:#e74c3c"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#fffcf5"/>
    </linearGradient>
    <linearGradient id="qIcon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c0392b"/>
      <stop offset="100%" style="stop-color:#e74c3c"/>
    </linearGradient>
  </defs>

  <!-- 纯色背景（高对比度友好） -->
  <rect width="1080" height="1920" fill="url(#bg)"/>

  <!-- ===== 顶部红色标题区 ===== -->
  <rect x="0" y="0" width="1080" height="180" fill="url(#headerBg)"/>

  <!-- 问号图标 -->
  <circle cx="76" cy="70" r="28" fill="rgba(255,255,255,0.2)"/>
  <text x="76" y="81" font-family="Arial" font-size="30" text-anchor="middle" fill="#ffffff" font-weight="bold">?</text>

  <text x="122" y="68" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="34" font-weight="900" fill="#ffffff" letter-spacing="2">常见问题解答</text>
  <text x="124" y="98" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="15" fill="rgba(255,255,255,0.8)" letter-spacing="3">让您买得放心 · 用得安心</text>

  <!-- 产品名称标签 -->
  <rect x="76" y="120" width="320" height="34" rx="17" fill="rgba(255,255,255,0.18)"/>
  <text x="98" y="143" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="15" fill="#ffffff" font-weight="700" letter-spacing="1">魔根金虫草胶囊</text>

  <!-- ===== 正文区 ===== -->
  
  <!-- FAQ 1：正品 -->
  <g transform="translate(45, 210)">
    <rect width="990" height="115" rx="16" fill="url(#cardBg)" stroke="rgba(192,57,43,0.12)" stroke-width="1.5"/>
    <rect x="0" y="0" width="5" height="115" rx="2.5" fill="#c0392b"/>

    <circle cx="32" cy="32" r="14" fill="url(#qIcon)"/>
    <text x="32" y="38" font-family="Arial" font-size="14" text-anchor="middle" fill="#ffffff" font-weight="bold">?</text>
    <text x="56" y="37" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="18" font-weight="700" fill="#c0392b">你们家产品是正品吗？</text>

    <circle cx="32" cy="82" r="13" fill="rgba(192,57,43,0.08)" stroke="rgba(192,57,43,0.2)" stroke-width="1.5"/>
    <text x="32" y="88" font-family="Arial" font-size="12" text-anchor="middle" fill="#c0392b" font-weight="bold">✓</text>
    <text x="56" y="80" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="17" fill="#222222">
      咱们产品保证是<tspan fill="#c0392b" font-weight="700">正品</tspan>，<tspan fill="#c0392b" font-weight="700">假一罚十</tspan>。每一盒都有据可查，放心购买！
    </text>
  </g>

  <!-- FAQ 2：用量 -->
  <g transform="translate(45, 350)">
    <rect width="990" height="175" rx="16" fill="url(#cardBg)" stroke="rgba(192,57,43,0.12)" stroke-width="1.5"/>
    <rect x="0" y="0" width="5" height="175" rx="2.5" fill="#c0392b"/>

    <circle cx="32" cy="32" r="14" fill="url(#qIcon)"/>
    <text x="32" y="38" font-family="Arial" font-size="14" text-anchor="middle" fill="#ffffff" font-weight="bold">?</text>
    <text x="56" y="37" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="18" font-weight="700" fill="#c0392b">每天吃几粒？什么时候吃效果最好？</text>

    <circle cx="32" cy="82" r="13" fill="rgba(192,57,43,0.08)" stroke="rgba(192,57,43,0.2)" stroke-width="1.5"/>
    <text x="32" y="88" font-family="Arial" font-size="12" text-anchor="middle" fill="#c0392b" font-weight="bold">✓</text>
    <text x="56" y="80" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="17" fill="#222222">
      服用时间没有限制，推荐<tspan fill="#c0392b" font-weight="700">下午5点到7点</tspan>这个时间段吃。
    </text>
    <text x="56" y="110" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="17" fill="#222222">
      👨 <tspan fill="#c0392b" font-weight="700">男士</tspan>：第一周每天吃5粒，连续吃一周。以后每天吃3粒，间隔一天吃。
    </text>
    <text x="56" y="140" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="17" fill="#222222">
      👩 <tspan fill="#c0392b" font-weight="700">女士</tspan>：每天吃2粒，间隔一天吃。
    </text>
  </g>

  <!-- FAQ 3：好处 -->
  <g transform="translate(45, 550)">
    <rect width="990" height="150" rx="16" fill="url(#cardBg)" stroke="rgba(192,57,43,0.12)" stroke-width="1.5"/>
    <rect x="0" y="0" width="5" height="150" rx="2.5" fill="#c0392b"/>

    <circle cx="32" cy="32" r="14" fill="url(#qIcon)"/>
    <text x="32" y="38" font-family="Arial" font-size="14" text-anchor="middle" fill="#ffffff" font-weight="bold">?</text>
    <text x="56" y="37" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="18" font-weight="700" fill="#c0392b">吃魔根金虫草胶囊有什么好处？</text>

    <circle cx="32" cy="82" r="13" fill="rgba(192,57,43,0.08)" stroke="rgba(192,57,43,0.2)" stroke-width="1.5"/>
    <text x="32" y="88" font-family="Arial" font-size="12" text-anchor="middle" fill="#c0392b" font-weight="bold">✓</text>
    <text x="56" y="80" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="17" fill="#222222">
      冬虫夏草入<tspan fill="#c0392b" font-weight="700">肾肺二经</tspan>，特别是对<tspan fill="#c0392b" font-weight="700">40岁以上的男士</tspan>，
    </text>
    <text x="56" y="110" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="17" fill="#222222">
      是很不错的选择。🌟
    </text>
  </g>

  <!-- FAQ 4：副作用 -->
  <g transform="translate(45, 725)">
    <rect width="990" height="150" rx="16" fill="url(#cardBg)" stroke="rgba(192,57,43,0.12)" stroke-width="1.5"/>
    <rect x="0" y="0" width="5" height="150" rx="2.5" fill="#c0392b"/>

    <circle cx="32" cy="32" r="14" fill="url(#qIcon)"/>
    <text x="32" y="38" font-family="Arial" font-size="14" text-anchor="middle" fill="#ffffff" font-weight="bold">?</text>
    <text x="56" y="37" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="18" font-weight="700" fill="#c0392b">长期服用，会有副作用吗？</text>

    <circle cx="32" cy="82" r="13" fill="rgba(192,57,43,0.08)" stroke="rgba(192,57,43,0.2)" stroke-width="1.5"/>
    <text x="32" y="88" font-family="Arial" font-size="12" text-anchor="middle" fill="#c0392b" font-weight="bold">✓</text>
    <text x="56" y="80" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="17" fill="#222222">
      咱们是<tspan fill="#c0392b" font-weight="700">药食同源</tspan>，道地产品，<tspan fill="#c0392b" font-weight="700">1997-188号批号</tspan>。
    </text>
    <text x="56" y="110" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="17" fill="#222222">
      可以长期服用，不会有任何副作用。✅
    </text>
  </g>

  <!-- FAQ 5：价格 -->
  <g transform="translate(45, 900)">
    <rect width="990" height="235" rx="16" fill="url(#cardBg)" stroke="rgba(192,57,43,0.12)" stroke-width="1.5"/>
    <rect x="0" y="0" width="5" height="235" rx="2.5" fill="#c0392b"/>

    <circle cx="32" cy="32" r="14" fill="url(#qIcon)"/>
    <text x="32" y="38" font-family="Arial" font-size="14" text-anchor="middle" fill="#ffffff" font-weight="bold">?</text>
    <text x="56" y="37" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="18" font-weight="700" fill="#c0392b">价格可以再便宜一些吗？</text>

    <circle cx="32" cy="82" r="13" fill="rgba(192,57,43,0.08)" stroke="rgba(192,57,43,0.2)" stroke-width="1.5"/>
    <text x="32" y="88" font-family="Arial" font-size="12" text-anchor="middle" fill="#c0392b" font-weight="bold">✓</text>
    <text x="56" y="80" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="17" fill="#222222">
      非常理解您。价格是由价值决定的。
    </text>
    <text x="56" y="110" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="17" fill="#222222">
      原材料是<tspan fill="#c0392b" font-weight="700">冬虫夏草菌丝体</tspan>和<tspan fill="#c0392b" font-weight="700">五年以上的红参</tspan>。
    </text>
    <text x="56" y="140" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="17" fill="#222222">
      冬虫夏草只有一点点菌丝体，不像其他家用的是全虫草。
    </text>
    <text x="56" y="170" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="17" fill="#222222">
      每100克含有的<tspan fill="#c0392b" font-weight="700">腺苷含量≥220mg</tspan>。
    </text>
    <text x="56" y="200" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="17" fill="#222222">
      是其他家的几倍甚至十几倍。值不值，相信您心里有了答案。💪
    </text>
  </g>

  <!-- FAQ 6：保质期 -->
  <g transform="translate(45, 1160)">
    <rect width="990" height="115" rx="16" fill="url(#cardBg)" stroke="rgba(192,57,43,0.12)" stroke-width="1.5"/>
    <rect x="0" y="0" width="5" height="115" rx="2.5" fill="#c0392b"/>

    <circle cx="32" cy="32" r="14" fill="url(#qIcon)"/>
    <text x="32" y="38" font-family="Arial" font-size="14" text-anchor="middle" fill="#ffffff" font-weight="bold">?</text>
    <text x="56" y="37" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="18" font-weight="700" fill="#c0392b">保质期是多久？生产日期是新鲜的吗？</text>

    <circle cx="32" cy="82" r="13" fill="rgba(192,57,43,0.08)" stroke="rgba(192,57,43,0.2)" stroke-width="1.5"/>
    <text x="32" y="88" font-family="Arial" font-size="12" text-anchor="middle" fill="#c0392b" font-weight="bold">✓</text>
    <text x="56" y="80" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="17" fill="#222222">
      <tspan fill="#c0392b" font-weight="700">保质期2年</tspan>。送到您手上的每盒产品，都是新鲜的生产日期。📅
    </text>
  </g>

  <!-- FAQ 7：发票 -->
  <g transform="translate(45, 1300)">
    <rect width="990" height="115" rx="16" fill="url(#cardBg)" stroke="rgba(192,57,43,0.12)" stroke-width="1.5"/>
    <rect x="0" y="0" width="5" height="115" rx="2.5" fill="#c0392b"/>

    <circle cx="32" cy="32" r="14" fill="url(#qIcon)"/>
    <text x="32" y="38" font-family="Arial" font-size="14" text-anchor="middle" fill="#ffffff" font-weight="bold">?</text>
    <text x="56" y="37" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="18" font-weight="700" fill="#c0392b">可以开发票吗？</text>

    <circle cx="32" cy="82" r="13" fill="rgba(192,57,43,0.08)" stroke="rgba(192,57,43,0.2)" stroke-width="1.5"/>
    <text x="32" y="88" font-family="Arial" font-size="12" text-anchor="middle" fill="#c0392b" font-weight="bold">✓</text>
    <text x="56" y="80" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="17" fill="#222222">
      咱们是正规商家，支持开具发票。您下单后前往发票中心申请，
    </text>
    <text x="56" y="107" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="17" fill="#222222">
      正常<tspan fill="#c0392b" font-weight="700">3个工作日内</tspan>开具完毕。
    </text>
  </g>

  <!-- ===== 底部 ===== -->
  <line x1="45" y1="1450" x2="1035" y2="1450" stroke="rgba(192,57,43,0.12)" stroke-width="1"/>

  <text x="45" y="1485" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="15" fill="#999999">魔根金虫草胶囊 · <tspan fill="#c0392b">药食同源 道地产品</tspan></text>
  <text x="1035" y="1485" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="15" fill="#c0392b" text-anchor="end" font-weight="500">更多问题请咨询客服 💬</text>

  <!-- 底部装饰 -->
  <rect x="0" y="1860" width="1080" height="60" fill="#c0392b" opacity="0.04"/>
</svg>
