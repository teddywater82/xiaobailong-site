      <stop offset="0%" style="stop-color:#1a3a1a"/>
      <stop offset="40%" style="stop-color:#0d2610"/>
      <stop offset="70%" style="stop-color:#1a2f1a"/>
      <stop offset="100%" style="stop-color:#0f1f10"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af37"/>
      <stop offset="100%" style="stop-color:#f5d97a"/>
    </linearGradient>
    <linearGradient id="divider" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:rgba(212,175,55,0.3)"/>
      <stop offset="50%" style="stop-color:rgba(212,175,55,0.1)"/>
      <stop offset="100%" style="stop-color:rgba(212,175,55,0)"/>
