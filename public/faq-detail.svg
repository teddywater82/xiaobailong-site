    <text x="28" y="33" font-family="Arial" font-size="12" text-anchor="middle" fill="#ffffff" font-weight="bold">?</text>
    <text x="50" y="33" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="15" font-weight="600" fill="#1a73e8">你们家产品是正品吗？</text>

