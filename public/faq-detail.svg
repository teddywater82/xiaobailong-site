    <text x="28" y="76" font-family="Arial" font-size="10" text-anchor="middle" fill="#1a73e8" font-weight="bold">✓</text>
    <text x="50" y="69" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="14" fill="#444444">
      咱们产品保证<tspan fill="#1a73e8" font-weight="600">百分百是正品</tspan>，<tspan fill="#e53935" font-weight="600">假一罚十</tspan>。每一盒都有据可查，放心购买！
    </text>
  </g>

  <!-- FAQ 2：用量 -->
  <g transform="translate(50, 345)">
