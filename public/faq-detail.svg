  <!-- ===== 底部 ===== -->
  <line x1="48" y1="1390" x2="1032" y2="1390" stroke="rgba(212,175,55,0.1)" stroke-width="1"/>

  <text x="48" y="1420" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="13" fill="rgba(255,255,255,0.3)">魔根金虫草胶囊 · <tspan fill="rgba(212,175,55,0.4)">药食同源 道地产品</tspan></text>
  <text x="1032" y="1420" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="14" fill="rgba(245,217,122,0.4)" text-anchor="end">更多问题请咨询客服 💬</text>

  <!-- 底部装饰横条 -->
  <rect x="20" y="1860" width="1040" height="40" rx="0 0 24 24" fill="rgba(212,175,55,0.04)"/>
