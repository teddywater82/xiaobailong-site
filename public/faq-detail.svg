    </text>
    <text x="42" y="117" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="14" fill="rgba(255,255,255,0.85)">
      👩 <tspan fill="#d4af37" font-weight="600">女士</tspan>：每天吃2粒，<tspan fill="#66bb6a" font-weight="600">间隔一天吃</tspan>。
    </text>
  </g>

