  <rect x="48" y="55" width="52" height="52" rx="13" fill="url(#gold)"/>
  <text x="74" y="87" font-family="Arial" font-size="26" text-anchor="middle" fill="#0d1b0e" font-weight="bold">?</text>

  <text x="118" y="78" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="32" font-weight="900" fill="#f5d97a" letter-spacing="2">常见问题解答</text>
  <text x="120" y="102" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="13" fill="rgba(245,217,122,0.5)" letter-spacing="3">FAQ · 让您买得放心用得安心</text>

  <!-- 产品标签 -->
