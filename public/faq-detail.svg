  <text x="68" y="141" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="13" fill="#f5d97a" font-weight="700">魔根金虫草胶囊</text>
  <text x="240" y="141" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="12" fill="#d4af37">· 药食同源 道地产品</text>

