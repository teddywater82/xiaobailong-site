  <line x1="50" y1="1395" x2="1030" y2="1395" stroke="rgba(26,115,232,0.1)" stroke-width="1"/>

  <text x="50" y="1428" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="13" fill="#999999">魔根金虫草胶囊 · <tspan fill="#1a73e8">药食同源 道地产品</tspan></text>
  <text x="1030" y="1428" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="13" fill="#1a73e8" text-anchor="end" font-weight="500">更多问题请咨询客服 💬</text>

