  <!-- 背景 -->
  <rect x="20" y="20" width="1040" height="1880" rx="24" fill="url(#bg)"/>

  <!-- 装饰光晕 -->
  <circle cx="800" cy="300" r="350" fill="rgba(212,175,55,0.04)"/>
  <circle cx="300" cy="1600" r="300" fill="rgba(212,175,55,0.03)"/>

