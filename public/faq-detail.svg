      注意一根冬虫夏草只有一点点菌丝体，不像其他家用的是全虫草。
    </text>
    <text x="42" y="141" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="14" fill="rgba(255,255,255,0.85)">
