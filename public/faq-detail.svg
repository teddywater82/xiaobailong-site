    <rect x="0" y="0" width="3" height="110" rx="1.5" fill="url(#gold)"/>

    <circle cx="22" cy="26" r="11" fill="url(#gold)"/>
    <text x="22" y="30.5" font-family="Arial" font-size="11" text-anchor="middle" fill="#0d1b0e" font-weight="bold">?</text>
    <text x="42" y="30.5" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="15" font-weight="600" fill="#f5d97a">你们家产品是正品吗？</text>

